<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer's Conference</title>
    <!-- google font : inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- external css link -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header>
      <!-- navbar starts here -->
      <nav class="container">
        <div class="brand-logo">
          <img src="./assets/logo.png" alt="brand-logo" />
        </div>
        <div class="Menu-items">
          <ul>
            <li><a class="text-primary" href="">Speakers</a></li>
            <li><a class="text-primary" href="">Schedule</a></li>
            <li><a class="text-primary" href="">Tracks</a></li>
            <li><a class="text-primary" href="">Venue</a></li>
            <li><a class="text-primary" href="">Blog</a></li>
          </ul>
        </div>
        <div class="nav-button">
          <button class="common-btn">Register Now</button>
        </div>
      </nav>
      <!-- navbar ends here -->

      <!-- hero / banner starts here -->
      <div id="banner-container">
        <div class="banner-content">
          <h1>Code. <em>Connect.</em> Create</h1>
          <p>
            Join 4,000+ engineers, founders, and builders at the premier
            developer <br />
            conference of 2026. Three days of cutting-edge talks, hands-on
            workshops, <br />
            and meaningful connections.
          </p>
          <div class="hero-btn">
            <button class="common-btn">Register Now</button>
          </div>
        </div>
      </div>

      <!-- hero / banner ends here -->
    </header>

    <!-- main section -->
    <main>
      <section id="Meet-the-speakers" class="container">
        <h2 class="speakers-heading">Meet the Speakers</h2>
      </section>
    </main>
  </body>
</html>
